<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Fishdex — Le Strava de la pêche">

  <!-- Viewport — viewport-fit=cover = edge-to-edge iPhone notch/island -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- "default" = barre de statut avec icônes sombres, compatible fond blanc -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fishdex">

  <!-- Splash screen color (zone autour du contenu au lancement) -->
  <meta name="theme-color" content="#FFFFFF">

  <!-- Icône iPhone home screen -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Fishdex</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Évite le flash blanc/bleu au chargement */
    html, body {
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>
<body>
  <script>
  // iOS PWA ne re-fetche pas index.html au lancement (restore depuis cache local).
  // Ce script fetche version.json avec cache:'no-store' (toujours réseau),
  // compare avec la version stockée, et force un reload si nouveau déploiement.
  (function(){
    var K='fdx_v';
    fetch('/version.json?t='+Date.now(),{cache:'no-store'})
      .then(function(r){return r.json();})
      .then(function(d){
        var v=d&&d.v?String(d.v):null;
        if(!v)return;
        var old=localStorage.getItem(K);
        localStorage.setItem(K,v);
        if(old&&old!==v)window.location.reload(true);
      })
      .catch(function(){});
  })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
